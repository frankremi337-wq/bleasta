  :root {
    --bg:#0f0f0f; --surface:#1c1c1c; --surface2:#2a2a2a;
    --border:#333; --text:#fff; --text-dim:#aaa;
    --tab-active-bg:#fff; --tab-active-text:#000;
    --btn-bg:#fff; --btn-text:#000;
    --gold:#f5c518; --gold-dim:#7a6010;
    --radius:16px; --tr:0.22s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="white"]{--bg:#f0f0f0;--surface:#fff;--surface2:#e8e8e8;--border:#ccc;--text:#000;--text-dim:#555;--tab-active-bg:#000;--tab-active-text:#fff;--btn-bg:#000;--btn-text:#fff;--gold-dim:#bfa020;}
  [data-theme="blue"]{--bg:#ddeeff;--surface:#eef6ff;--surface2:#c8e4fc;--border:#a0c8f0;--text:#0a2a4a;--text-dim:#3a6a9a;--tab-active-bg:#1a6abf;--tab-active-text:#fff;--btn-bg:#1a6abf;--btn-text:#fff;--gold-dim:#b08820;}
  [data-theme="pink"]{--bg:#fff0f4;--surface:#fff;--surface2:#ffe0ea;--border:#f8b8cc;--text:#3a0020;--text-dim:#a0607a;--tab-active-bg:#e8507a;--tab-active-text:#fff;--btn-bg:#e8507a;--btn-text:#fff;--gold-dim:#c09050;}

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);transition:background var(--tr),color var(--tr);overscroll-behavior:none;}

  /* ── LOGIN ── */
  #loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20000;gap:20px;padding:20px;transition:opacity 0.4s;}
  #loginScreen.hidden{opacity:0;pointer-events:none;}

  input,select{padding:10px;margin:5px 0;width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;-webkit-appearance:none;}

  button{padding:10px;margin:5px 0;width:100%;background:var(--btn-bg);color:var(--btn-text);border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:filter var(--tr),transform var(--tr),box-shadow var(--tr);}

  .btn-danger{background:#c0392b!important;color:#fff!important;}

  /* ── LOADING ── */
  #loadingOverlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;gap:16px;transition:opacity 0.4s;}

  .spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin 0.7s linear infinite;}

  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>

// ── AUTH ──────────────────────────────────────────
window.signInWithGoogle = async () => {
  try { await signInWithPopup(auth, prov); }
  catch(e) { showToast("Innlogging feilet: " + e.message); }
};
window.doSignOut = async () => { await signOut(auth); };

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    const ls = document.getElementById("loginScreen");
    ls.classList.add("hidden");
    setTimeout(()=>ls.style.display="none", 450);
    document.getElementById("app").classList.add("visible");
    document.getElementById("fabBtn").style.display = "flex";
    updateAvatarTab();
    loadAllClothes();
  } else {
    currentUser = null;
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("loginScreen").classList.remove("hidden");
    document.getElementById("app").classList.remove("visible");
    document.getElementById("fabBtn").style.display = "none";
    const ov = document.getElementById("loadingOverlay");
    ov.classList.add("hidden"); ov.style.display = "none";
  }
});

// ── NAVIGATION ────────────────────────────────────
let currentPage = "closet";
window.showPage = (page) => {
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".bnav-item").forEach(b=>b.classList.remove("active"));
  document.getElementById("page-"+page)?.classList.add("active");
  const bn = document.getElementById("bnav-"+page);
  if (bn) bn.classList.add("active");
  setAvatarTabActive(page === "profil");
  document.getElementById("fabBtn").style.display = (page === "closet") ? "flex" : "none";
  if (page === "profil") renderProfile();
  currentPage = page;
};

// ── AVATAR TAB ────────────────────────────────────
function updateAvatarTab() {
  if (!currentUser) return;
  const wrap = document.getElementById("avatarTab");
  const custom = localStorage.getItem("blaesta-pic-" + currentUser.uid);
  const src = custom || currentUser.photoURL;
  wrap.innerHTML = "";
  if (src) {
    const img = document.createElement("img");
    img.src = src; img.referrerPolicy = "no-referrer";
    img.className = "tab-avatar"; img.title = "Profil";
    wrap.appendChild(img);
  } else {
    const ph = document.createElement("div");
    ph.className = "tab-avatar-placeholder"; ph.textContent = "👤";
    wrap.appendChild(ph);
  }
}
function setAvatarTabActive(a) {
  const el = document.getElementById("avatarTab").firstChild;
  if (el) el.classList.toggle("active", a);
}

// ── THEME ─────────────────────────────────────────
window.setTheme = (t, btn) => {
  if (t==="dark") document.documentElement.removeAttribute("data-theme");
  else document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem("blaesta-theme", t);
  document.querySelectorAll(".theme-btn").forEach(b=>b.classList.remove("selected"));
  if (btn) btn.classList.add("selected");
};
function loadTheme() {
  const s = localStorage.getItem("blaesta-theme") || "dark";
  window.setTheme(s, document.querySelector(`.theme-btn[data-t="${s}"]`));
}

// ── TOAST ─────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.style.display="none", 2500);
}

// ── FIRESTORE ─────────────────────────────────────
async function loadAllClothes() {
  if (!currentUser) return;
  const timeout = setTimeout(() => {
    hideLoading();
    showToast("⚠️ Sjekk Firestore-reglene i Firebase Console");
  }, 8000);
  try {
    const q = query(collection(db,"clothes"), where("uid","==",currentUser.uid));
    const snap = await getDocs(q);
    clothes = snap.docs.map(d=>d.data());
    clothes.sort((a,b)=>(a.uploadedAt||0)-(b.uploadedAt||0));
    clothes.forEach(item=>{ outfit[item.category] = item; });
  } catch(e) { showToast("Feil: " + e.message); }
  clearTimeout(timeout);
  renderCloset(); renderOutfit();
  hideLoading();
}
function hideLoading() {
  const ov = document.getElementById("loadingOverlay");
  ov.classList.add("hidden"); setTimeout(()=>ov.style.display="none", 450);
}
async function saveItem(item) { await setDoc(doc(db,"clothes",String(item.id)), item); }
async function removeItem(item) { await deleteDoc(doc(db,"clothes",String(item.id))); }

// ── STARS ─────────────────────────────────────────
function buildStars(item, idx) {
  const row = document.createElement("div"); row.className = "star-row";
  for (let s=1;s<=5;s++) {
    const star = document.createElement("span");
    star.className = "star" + (s<=(item.rating||0)?" lit":"");
    star.textContent = "★";
    star.addEventListener("mouseenter",()=>row.querySelectorAll(".star").forEach((st,i)=>st.classList.toggle("lit",i<s)));
    star.addEventListener("mouseleave",()=>row.querySelectorAll(".star").forEach((st,i)=>st.classList.toggle("lit",i<(item.rating||0))));
    star.addEventListener("click", async e => {
      e.stopPropagation();
      item.rating = s; clothes[idx].rating = s;
      await saveItem(item);
      star.classList.add("pop");
      star.addEventListener("animationend",()=>star.classList.remove("pop"),{once:true});
      row.querySelectorAll(".star").forEach((st,i)=>st.classList.toggle("lit",i<s));
      showToast(`${item.name}: ${"★".repeat(s)}${"☆".repeat(5-s)}`);
    });
    row.appendChild(star);
  }
  return row;
}

// ── CLOSET ────────────────────────────────────────
window.renderCloset = function renderCloset() {
  const grid     = document.getElementById("grid");
  const search   = (document.getElementById("searchInput")?.value||"").toLowerCase();
  const filterC  = document.getElementById("filterCat")?.value||"";
  const sortV    = document.getElementById("sortBy")?.value||"newest";

  let filtered = clothes.filter(item => {
    const ms = item.name.toLowerCase().includes(search);
    const mc = !filterC || item.category === filterC;
    return ms && mc;
  });
  filtered.sort((a,b)=>{
    if (sortV==="oldest") return (a.uploadedAt||0)-(b.uploadedAt||0);
    if (sortV==="name")   return a.name.localeCompare(b.name,"no");
    if (sortV==="rating") return (b.rating||0)-(a.rating||0);
    return (b.uploadedAt||0)-(a.uploadedAt||0);
  });

  const cnt = document.getElementById("closetCount");
  if (cnt) cnt.textContent = `${filtered.length}/${clothes.length}`;

  grid.innerHTML = "";
  filtered.forEach((item,i) => {
    const realIdx = clothes.indexOf(item);
    const card = document.createElement("div");
    card.className = "card"; card.style.animationDelay=(i*30)+"ms";
    const img = document.createElement("img"); img.src=item.img; img.loading="lazy";
    card.appendChild(img);
    const info = document.createElement("div"); info.className="card-info";
    info.textContent = `${item.name} · ${item.category}`;
    card.appendChild(info);
    card.appendChild(buildStars(item, realIdx));
    const eb = document.createElement("button"); eb.className="editBtn"; eb.textContent="edit";
    eb.onclick = e => {
      e.stopPropagation();
      const box=document.getElementById("ed-"+realIdx);
      box.style.display=box.style.display==="block"?"none":"block";
    };
    card.appendChild(eb);
    const editBox = document.createElement("div"); editBox.className="editBox"; editBox.id="ed-"+realIdx;
    editBox.innerHTML=`
      <input id="en-${realIdx}" value="${item.name}"/>
      <select id="ec-${realIdx}">
        ${cats.map(c=>`<option value="${c}" ${item.category===c?"selected":""}>${c}</option>`).join("")}
      </select>
      <button onclick="saveEdit(event,${realIdx})">Lagre</button>
      <button class="btn-danger" onclick="deleteItem(event,${realIdx})">Slett</button>
    `;
    card.appendChild(editBox);
    grid.appendChild(card);
  });
}

window.saveEdit = async (e,i) => {
  e.stopPropagation();
  const nn=document.getElementById("en-"+i).value;
  const nc=document.getElementById("ec-"+i).value;
  cats.forEach(cat=>{ if(outfit[cat]&&outfit[cat].id===clothes[i].id) outfit[cat]=null; });
  clothes[i].name=nn; clothes[i].category=nc;
  await saveItem(clothes[i]); outfit[nc]=clothes[i];
  renderCloset(); renderOutfit(); showToast("Lagret ✓");
};
window.deleteItem = async (e,i) => {
  e.stopPropagation();
  const r=clothes[i];
  cats.forEach(cat=>{ if(outfit[cat]&&outfit[cat].id===r.id) outfit[cat]=null; });
  await removeItem(r); clothes.splice(i,1);
  renderCloset(); renderOutfit(); showToast(`"${r.name}" slettet`);
};

// ── OUTFIT ────────────────────────────────────────
function makeSlot(cat, cls) {
  const wrap = document.createElement("div");
  if (outfit[cat]) {
    const img = document.createElement("img");
    img.className = "outfit-img " + cls;
    img.src = outfit[cat].img;
    img.title = "Klikk for å bytte";
    img.onclick = () => randomSwap(cat);
    wrap.appendChild(img);
  } else {
    const empty = document.createElement("div");
    empty.className = cls;
    wrap.appendChild(empty);
  }
  return wrap;
}

function renderOutfit() {
  const box = document.getElementById("outfit");
  box.innerHTML = "";

  const row1 = document.createElement("div"); row1.className="outfit-row";
  row1.appendChild(makeSlot("hats",    "slot-hat"));
  row1.appendChild(makeSlot("top",     "slot-top"));
  row1.appendChild(makeSlot("jacket",  "slot-jacket"));
  box.appendChild(row1);

  const row2 = document.createElement("div"); row2.className="outfit-row";
  row2.appendChild(makeSlot("accessories","slot-acc"));
  row2.appendChild(makeSlot("bottom",     "slot-bottom"));
  row2.appendChild(makeSlot("shoes",      "slot-shoes"));
  box.appendChild(row2);
}

function randomSwap(cat) {
  const opts = clothes.filter(c=>c.category===cat);
  if (!opts.length) return;
  const cur = outfit[cat];
  const pool = cur ? opts.filter(c=>c.id!==cur.id) : opts;
  outfit[cat] = (pool.length?pool:opts)[Math.floor(Math.random()*(pool.length||opts.length))];
  renderOutfit();
}

// ── SPIN ALL ──────────────────────────────────────
window._spinAll = () => {
  const btn = document.getElementById("diceBtn");
  if (btn) { btn.style.transition="transform 0.5s ease"; btn.style.transform="rotate(720deg)"; setTimeout(()=>{btn.style.transition="";btn.style.transform="";},520); }
  cats.forEach(cat => {
    const opts = clothes.filter(c=>c.category===cat);
    if (opts.length) outfit[cat] = opts[Math.floor(Math.random()*opts.length)];
  });
  renderOutfit();
};

// ── SAVED OUTFITS ─────────────────────────────────
function _key()   { return currentUser ? "blaesta-saved-"+currentUser.uid : "blaesta-saved-guest"; }
function _get()   { try { return JSON.parse(localStorage.getItem(_key())||"[]"); } catch { return []; } }
function _set(a)  { localStorage.setItem(_key(), JSON.stringify(a)); }

window._openSaved = () => { _renderSaved(); document.getElementById("savedOverlay").classList.add("open"); document.getElementById("savedPanel").classList.add("open"); };
window._closeSaved = () => { document.getElementById("savedOverlay").classList.remove("open"); document.getElementById("savedPanel").classList.remove("open"); };
window._saveCurrent = () => {
  const name = document.getElementById("outfitNameInput").value.trim();
  if (!name) { showToast("Gi outfiten et navn!"); return; }
  const slots = {};
  Object.keys(outfit).forEach(cat=>{ if(outfit[cat]) slots[cat]=outfit[cat].id; });
  if (!Object.keys(slots).length) { showToast("Ingen plagg i outfiten!"); return; }
  const arr = _get();
  arr.unshift({ id:Date.now(), name, date:new Date().toLocaleDateString("no-NO"), slots, thumbs:Object.values(outfit).filter(Boolean).slice(0,4).map(i=>i.img) });
  _set(arr);
  document.getElementById("outfitNameInput").value = "";
  _renderSaved();
  showToast(`"${name}" lagret ✓`);
};
function _renderSaved() {
  const list = document.getElementById("savedList");
  const arr  = _get();
  list.innerHTML = "";
  if (!arr.length) { list.innerHTML='<div class="empty-msg">Ingen lagrede outfits ennå.<br/>Sett opp en outfit og trykk Lagre!</div>'; return; }
  arr.forEach((entry,idx) => {
    const item = document.createElement("div"); item.className="saved-item";
    const thumbs = document.createElement("div"); thumbs.className="saved-item-thumbs";
    (entry.thumbs||[]).slice(0,4).forEach(url=>{const i=document.createElement("img");i.src=url;thumbs.appendChild(i);});
    item.appendChild(thumbs);
    const info = document.createElement("div"); info.style.flex="1";
    info.innerHTML=`<div class="saved-item-name">${entry.name}</div><div class="saved-item-date">${entry.date||""}</div>`;
    item.appendChild(info);
    const del = document.createElement("button"); del.className="saved-item-del"; del.textContent="🗑";
    del.onclick = e => { e.stopPropagation(); const a=_get(); a.splice(idx,1); _set(a); _renderSaved(); showToast("Outfit slettet"); };
    item.appendChild(del);
    item.onclick = () => {
      Object.keys(outfit).forEach(cat=>outfit[cat]=null);
      Object.entries(entry.slots).forEach(([cat,id])=>{ const f=clothes.find(c=>String(c.id)===String(id)); if(f)outfit[cat]=f; });
      renderOutfit(); window._closeSaved(); showToast(`"${entry.name}" lastet ✓`);
    };
    list.appendChild(item);
  });
}

// ── UPLOAD ────────────────────────────────────────
window.openUpload  = () => { document.getElementById("uploadOverlay").classList.add("open"); document.getElementById("uploadDrawer").classList.add("open"); };
window.closeUpload = () => { document.getElementById("uploadOverlay").classList.remove("open"); document.getElementById("uploadDrawer").classList.remove("open"); };

const dropzone  = document.getElementById("dropzone");
const fileInput = document.getElementById("file");
const preview   = document.getElementById("preview");
function showPreview(f) { if(!f)return; const r=new FileReader(); r.onload=e=>{preview.src=e.target.result;preview.style.display="block";}; r.readAsDataURL(f); }
dropzone.addEventListener("click",()=>fileInput.click());
fileInput.addEventListener("change",e=>showPreview(e.target.files[0]));
dropzone.addEventListener("dragover",e=>{e.preventDefault();dropzone.classList.add("drag-over");});
dropzone.addEventListener("dragleave",()=>dropzone.classList.remove("drag-over"));
dropzone.addEventListener("drop",e=>{e.preventDefault();dropzone.classList.remove("drag-over");fileInput.files=e.dataTransfer.files;showPreview(e.dataTransfer.files[0]);});

async function uploadToCloudinary(file) {
  const fd = new FormData(); fd.append("file",file); fd.append("upload_preset",CLOUDINARY_PRESET);
  const wrap=document.getElementById("progressWrap"),bar=document.getElementById("progressBar"),status=document.getElementById("uploadStatus");
  wrap.style.display="block"; status.textContent="Laster opp…";
  return new Promise((res,rej)=>{
    const xhr=new XMLHttpRequest();
    xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`);
    xhr.upload.onprogress=e=>{if(e.lengthComputable){const p=Math.round(e.loaded/e.total*100);bar.style.width=p+"%";status.textContent=`Laster opp… ${p}%`;}};
    xhr.onload=()=>{wrap.style.display="none";bar.style.width="0%";status.textContent="";if(xhr.status===200){const r=JSON.parse(xhr.responseText);res({url:r.secure_url,publicId:r.public_id});}else rej(new Error("Cloudinary feil: "+xhr.status));};
    xhr.onerror=()=>{wrap.style.display="none";rej(new Error("Nettverksfeil"));};
    xhr.send(fd);
  });
}

window.addItem = async () => {
  const name=document.getElementById("nameInput").value.trim();
  const category=document.getElementById("category").value;
  const file=fileInput.files[0];
  const addBtn=document.getElementById("addBtn");
  if (!name||!file) { showToast("Fyll inn navn og velg et bilde."); return; }
  if (!currentUser)  { showToast("Du må logge inn først."); return; }
  addBtn.disabled=true; addBtn.textContent="Laster opp…";
  try {
    const {url,publicId} = await uploadToCloudinary(file);
    const item = {id:Date.now()+"_"+Math.random().toString(36).slice(2),uid:currentUser.uid,name,category,img:url,cloudinaryId:publicId,rating:0,uploadedAt:Date.now()};
    await saveItem(item); clothes.push(item); outfit[category]=item;
    document.getElementById("nameInput").value=""; fileInput.value=""; preview.style.display="none"; preview.src="";
    renderCloset(); renderOutfit();
    showToast(`"${name}" lagt til ✓`); closeUpload();
  } catch(e) { showToast("Feil: "+e.message); }
  finally { addBtn.disabled=false; addBtn.textContent="Legg til"; }
};

// ── PROFILE ───────────────────────────────────────
function renderProfile() {
  if (!currentUser) return;
  const custom = localStorage.getItem("blaesta-pic-"+currentUser.uid);
  const src    = custom || currentUser.photoURL;
  const avg    = clothes.length ? (clothes.reduce((s,c)=>s+(c.rating||0),0)/clothes.length).toFixed(1) : "–";
  const card   = document.getElementById("profileCard");
  card.innerHTML = "";

  const picWrap = document.createElement("div"); picWrap.className="profile-pic-wrap"; picWrap.title="Endre bilde";
  picWrap.onclick = () => {
    const inp=document.createElement("input"); inp.type="file"; inp.accept="image/*";
    inp.onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{ localStorage.setItem("blaesta-pic-"+currentUser.uid,ev.target.result); updateAvatarTab(); renderProfile(); showToast("Profilbilde oppdatert ✓"); }; r.readAsDataURL(f); };
    inp.click();
  };
  if (src) { const img=document.createElement("img"); img.className="profile-avatar"; img.src=src; img.referrerPolicy="no-referrer"; picWrap.appendChild(img); }
  else      { const ph=document.createElement("div"); ph.className="profile-avatar-placeholder"; ph.textContent="👤"; picWrap.appendChild(ph); }
  const ov=document.createElement("div"); ov.className="profile-pic-edit"; ov.textContent="✎"; picWrap.appendChild(ov);
  card.appendChild(picWrap);

  const nm=document.createElement("div"); nm.className="profile-name"; nm.textContent=currentUser.displayName||"Bruker"; card.appendChild(nm);
  const em=document.createElement("div"); em.className="profile-email"; em.textContent=currentUser.email; card.appendChild(em);
  const st=document.createElement("div"); st.className="profile-stats";
  st.innerHTML=`<div class="stat"><div class="stat-num">${clothes.length}</div><div class="stat-label">Plagg</div></div><div class="stat"><div class="stat-num">${avg}</div><div class="stat-label">Snitt ★</div></div><div class="stat"><div class="stat-num">${Object.values(outfit).filter(Boolean).length}</div><div class="stat-label">I outfit</div></div>`;
  card.appendChild(st);

  const so=document.createElement("button"); so.className="signout-btn"; so.textContent="Logg ut"; so.onclick=window.doSignOut; card.appendChild(so);
}

// ── BOOT ──────────────────────────────────────────
loadTheme();
</script>
